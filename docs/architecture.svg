<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="coreGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bindGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="cliGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="outputGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="620" rx="16" fill="#0f0f14"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="600" letter-spacing="3">ARCHITECTURE</text>

  <!-- ==================== CLI Layer ==================== -->
  <g filter="url(#shadow)">
    <rect x="40" y="58" width="800" height="64" rx="12" fill="url(#cliGrad)" opacity="0.9"/>
  </g>
  <text x="440" y="82" text-anchor="middle" fill="#fff" font-size="11" font-weight="600" opacity="0.7" letter-spacing="1.5">CLI &amp; INTEGRATIONS</text>
  <rect x="80" y="94" width="160" height="22" rx="6" fill="#fff" opacity="0.15"/>
  <text x="160" y="109" text-anchor="middle" fill="#fff" font-size="12" font-weight="500">TypeScript CLI</text>
  <rect x="280" y="94" width="160" height="22" rx="6" fill="#fff" opacity="0.15"/>
  <text x="360" y="109" text-anchor="middle" fill="#fff" font-size="12" font-weight="500">Python CLI</text>
  <rect x="480" y="94" width="160" height="22" rx="6" fill="#fff" opacity="0.15"/>
  <text x="560" y="109" text-anchor="middle" fill="#fff" font-size="12" font-weight="500">MCP Server</text>
  <rect x="680" y="94" width="120" height="22" rx="6" fill="#fff" opacity="0.15"/>
  <text x="740" y="109" text-anchor="middle" fill="#fff" font-size="12" font-weight="500">Agent CLI</text>

  <!-- Connector lines CLI → Bindings -->
  <line x1="160" y1="122" x2="260" y2="150" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <line x1="360" y1="122" x2="560" y2="150" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <line x1="560" y1="122" x2="260" y2="150" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>

  <!-- ==================== Bindings Layer ==================== -->
  <g filter="url(#shadow)">
    <rect x="100" y="148" width="320" height="48" rx="10" fill="url(#bindGrad)" opacity="0.9"/>
  </g>
  <text x="260" y="168" text-anchor="middle" fill="#fff" font-size="11" font-weight="600" opacity="0.7" letter-spacing="1">NAPI-RS</text>
  <text x="260" y="185" text-anchor="middle" fill="#fff" font-size="12" font-weight="400" opacity="0.85">Node.js FFI Binding</text>

  <g filter="url(#shadow)">
    <rect x="460" y="148" width="320" height="48" rx="10" fill="url(#bindGrad)" opacity="0.9"/>
  </g>
  <text x="620" y="168" text-anchor="middle" fill="#fff" font-size="11" font-weight="600" opacity="0.7" letter-spacing="1">PYO3</text>
  <text x="620" y="185" text-anchor="middle" fill="#fff" font-size="12" font-weight="400" opacity="0.85">Python FFI Binding</text>

  <!-- Connector lines Bindings → Core -->
  <line x1="260" y1="196" x2="440" y2="224" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
  <line x1="620" y1="196" x2="440" y2="224" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>

  <!-- ==================== Rust Core ==================== -->
  <g filter="url(#shadow)">
    <rect x="40" y="222" width="800" height="370" rx="14" fill="#1a1a24" stroke="#6366f1" stroke-width="1.5" opacity="0.95"/>
  </g>
  <rect x="40" y="222" width="800" height="36" rx="14" fill="url(#coreGrad)"/>
  <rect x="40" y="244" width="800" height="14" fill="url(#coreGrad)"/>
  <text x="440" y="246" text-anchor="middle" fill="#fff" font-size="13" font-weight="700" letter-spacing="2">ASTRAL-CORE  ·  RUST</text>

  <!-- Pipeline boxes -->
  <!-- Walker -->
  <rect x="72" y="278" width="130" height="50" rx="8" fill="#1e1e2e" stroke="#6366f1" stroke-width="1"/>
  <text x="137" y="299" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600" letter-spacing="1">WALKER</text>
  <text x="137" y="316" text-anchor="middle" fill="#94a3b8" font-size="10">File discovery</text>

  <!-- Arrow -->
  <line x1="202" y1="303" x2="230" y2="303" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#6366f1"/></marker></defs>

  <!-- Parser -->
  <rect x="232" y="278" width="130" height="50" rx="8" fill="#1e1e2e" stroke="#6366f1" stroke-width="1"/>
  <text x="297" y="299" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600" letter-spacing="1">PARSER</text>
  <text x="297" y="316" text-anchor="middle" fill="#94a3b8" font-size="10">Tree-sitter AST</text>

  <!-- Arrow -->
  <line x1="362" y1="303" x2="390" y2="303" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Chunker -->
  <rect x="392" y="278" width="130" height="50" rx="8" fill="#1e1e2e" stroke="#6366f1" stroke-width="1"/>
  <text x="457" y="299" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600" letter-spacing="1">CHUNKER</text>
  <text x="457" y="316" text-anchor="middle" fill="#94a3b8" font-size="10">Semantic splitting</text>

  <!-- Arrow -->
  <line x1="522" y1="303" x2="550" y2="303" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Batch Builder -->
  <rect x="552" y="278" width="140" height="50" rx="8" fill="#1e1e2e" stroke="#6366f1" stroke-width="1"/>
  <text x="622" y="299" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600" letter-spacing="1">BATCH BUILDER</text>
  <text x="622" y="316" text-anchor="middle" fill="#94a3b8" font-size="10">API request gen</text>

  <!-- Arrow down from Batch Builder -->
  <line x1="622" y1="328" x2="622" y2="348" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Anthropic API cloud -->
  <rect x="710" y="278" width="120" height="50" rx="25" fill="#1e1e2e" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="770" y="299" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="600" letter-spacing="0.5">ANTHROPIC</text>
  <text x="770" y="314" text-anchor="middle" fill="#fbbf24" font-size="9" opacity="0.8">Batch API</text>

  <!-- Arrow Batch Builder → API -->
  <line x1="692" y1="296" x2="710" y2="296" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Aggregator -->
  <rect x="552" y="350" width="140" height="50" rx="8" fill="#1e1e2e" stroke="#6366f1" stroke-width="1"/>
  <text x="622" y="371" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600" letter-spacing="1">AGGREGATOR</text>
  <text x="622" y="388" text-anchor="middle" fill="#94a3b8" font-size="10">Result mapping</text>

  <!-- Arrow API → Aggregator -->
  <line x1="770" y1="328" x2="770" y2="375" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="770" y1="375" x2="692" y2="375" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Arrow Aggregator → Renderers -->
  <line x1="622" y1="400" x2="622" y2="416" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="622" y1="416" x2="440" y2="416" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="440" y1="416" x2="440" y2="432" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ==================== Output Renderers ==================== -->
  <rect x="72" y="434" width="696" height="58" rx="10" fill="#0d2818" stroke="#10b981" stroke-width="1"/>
  <text x="420" y="452" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600" letter-spacing="1.5">OUTPUT RENDERERS</text>

  <!-- Format pills -->
  <rect x="88" y="460" width="70" height="22" rx="6" fill="#10b981" opacity="0.2"/>
  <text x="123" y="475" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="500">Markdown</text>

  <rect x="168" y="460" width="54" height="22" rx="6" fill="#10b981" opacity="0.2"/>
  <text x="195" y="475" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="500">JSON</text>

  <rect x="232" y="460" width="54" height="22" rx="6" fill="#10b981" opacity="0.2"/>
  <text x="259" y="475" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="500">JSONL</text>

  <rect x="296" y="460" width="44" height="22" rx="6" fill="#10b981" opacity="0.2"/>
  <text x="318" y="475" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="500">CSV</text>

  <rect x="350" y="460" width="52" height="22" rx="6" fill="#10b981" opacity="0.2"/>
  <text x="376" y="475" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="500">HTML</text>

  <rect x="412" y="460" width="78" height="22" rx="6" fill="#10b981" opacity="0.2"/>
  <text x="451" y="475" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="500">SARIF 2.1</text>

  <rect x="500" y="460" width="78" height="22" rx="6" fill="#10b981" opacity="0.2"/>
  <text x="539" y="475" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="500">Vector JSON</text>

  <!-- ==================== Agent Runtime ==================== -->
  <rect x="72" y="510" width="696" height="58" rx="10" fill="#1c1207" stroke="#f59e0b" stroke-width="1"/>
  <text x="420" y="528" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600" letter-spacing="1.5">AGENT RUNTIME</text>

  <rect x="88" y="536" width="100" height="22" rx="6" fill="#f59e0b" opacity="0.15"/>
  <text x="138" y="551" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="500">Orchestrator</text>

  <rect x="198" y="536" width="90" height="22" rx="6" fill="#f59e0b" opacity="0.15"/>
  <text x="243" y="551" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="500">Task Graph</text>

  <rect x="298" y="536" width="110" height="22" rx="6" fill="#f59e0b" opacity="0.15"/>
  <text x="353" y="551" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="500">Parallel Dispatch</text>

  <rect x="418" y="536" width="80" height="22" rx="6" fill="#f59e0b" opacity="0.15"/>
  <text x="458" y="551" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="500">Pipelines</text>

  <rect x="508" y="536" width="110" height="22" rx="6" fill="#f59e0b" opacity="0.15"/>
  <text x="563" y="551" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="500">State Machine</text>

  <!-- ==================== Language badges at bottom ==================== -->
  <text x="440" y="604" text-anchor="middle" fill="#64748b" font-size="10" letter-spacing="0.5">TypeScript  ·  JavaScript  ·  Python  ·  Java  ·  Go  ·  Rust  ·  Ruby  ·  PHP</text>
</svg>
