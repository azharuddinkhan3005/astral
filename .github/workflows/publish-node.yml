name: Publish npm

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x64-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: win32-x64-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        working-directory: crates/node
        run: npm install
      - name: Build native module
        working-directory: crates/node
        run: npx napi build --release --target ${{ matrix.target }}
      - name: Rename to platform-specific name
        working-directory: crates/node
        shell: bash
        run: |
          for f in *.node; do
            mv "$f" "astral-code.${{ matrix.suffix }}.node"
          done
          ls -la *.node
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binding-${{ matrix.suffix }}
          path: crates/node/astral-code.*.node

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        working-directory: crates/node
        run: npm install
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: crates/node/artifacts
      - name: Move all platform bindings
        working-directory: crates/node
        run: |
          for dir in artifacts/binding-*; do
            cp "$dir"/*.node .
          done
          rm -rf artifacts
          ls -la *.node
      - name: Publish
        working-directory: crates/node
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
